services:
  - type: web
    name: hanxinlong-portfolio
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /media/*
        name: Cache-Control
        value: public, max-age=604800
